name: Release Android (reusable)

on:
  workflow_call:
    inputs:
      lane:
        description: 'Fastlane lane to invoke (internal | closed | open)'
        required: true
        type: string
      runner:
        description: 'Runner label to execute on'
        required: true
        type: string
      release_notes:
        description: 'Release notes shown to testers (optional)'
        required: false
        type: string
        default: ''
    secrets:
      ANDROID_PLAY_STORE_SERVICE_ACCOUNT_JSON:
        required: true
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  release:
    name: Build & upload (${{ inputs.lane }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    concurrency:
      group: release-android-${{ inputs.lane }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/android

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/android/app/release.jks
          test -s mobile/android/app/release.jks

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ vars.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          cat > mobile/android/key.properties <<EOF
          storeFile=app/release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEYSTORE_PASSWORD}
          EOF

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: mobile
        run: dart run build_runner build --force-jit

      - name: Verify offline import isolation
        working-directory: mobile
        run: tool/check_offline_imports.sh

      - name: Deploy via fastlane
        working-directory: mobile/android
        env:
          ANDROID_PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
        run: bundle exec fastlane ${{ inputs.lane }} release_notes:"${{ inputs.release_notes }}"

      - name: Clean up signing material
        if: always()
        run: |
          rm -f mobile/android/key.properties mobile/android/app/release.jks
