name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2.18.0
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Check offline imports
        run: tool/check_offline_imports.sh

      - name: Run code generation
        run: dart run build_runner build --force-jit

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
