name: zamaj
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  clock: ^1.1.2
  crypto: ^3.0.7
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  equatable: ^2.0.7
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  url_launcher: ^6.3.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_async: ^1.3.3
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2
  drift_dev: ^2.33.0
  sqlite3: ^3.3.1
  flutter_launcher_icons: ^0.14.4

# Launcher icons are generated from the SVG masters in design/app_icon/ via
# tool/generate_app_icons.sh (rasterizes the SVGs, then runs this tool).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: design/app_icon/d_z_dumbbell/exports/full-1024.png
  adaptive_icon_background: design/app_icon/d_z_dumbbell/exports/background-1024.png
  adaptive_icon_foreground: design/app_icon/d_z_dumbbell/exports/foreground-1024.png
  adaptive_icon_monochrome: design/app_icon/d_z_dumbbell/exports/monochrome-1024.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/exercise_library_seed.json
