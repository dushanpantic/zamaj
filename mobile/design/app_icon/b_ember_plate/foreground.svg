    <circle cx="512" cy="512" r="265" fill="none" stroke="#7C2D12" stroke-opacity="0.45" stroke-width="10"/>
    <circle cx="512" cy="512" r="180" fill="none" stroke="#7C2D12" stroke-opacity="0.45" stroke-width="10"/>
    <circle cx="512" cy="512" r="124" fill="none" stroke="#FDBA74" stroke-opacity="0.6" stroke-width="8"/>
