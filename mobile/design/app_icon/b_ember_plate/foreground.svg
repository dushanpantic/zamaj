  </defs>
  <g transform="translate(512 512) scale(0.88) translate(-512 -512)">
    <path d="M842 512A330 330 0 1 1 182 512A330 330 0 1 1 842 512ZM630 512A118 118 0 1 0 394 512A118 118 0 1 0 630 512Z"
