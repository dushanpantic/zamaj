<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Design B "Ember Plate" — full-bleed composite.
       A bumper plate face-on, rendered as a glowing ember: outer disc with
       center hole, two faint grooves, molten rim around the hole.
       Use for: iOS appiconset, Android legacy ic_launcher, Play Store 512. -->
  <defs>
    <radialGradient id="bg" gradientUnits="userSpaceOnUse" cx="512" cy="430" r="780">
      <stop offset="0" stop-color="#211D19"/>
      <stop offset="0.55" stop-color="#161310"/>
      <stop offset="1" stop-color="#0D0B0A"/>
    </radialGradient>
    <radialGradient id="halo" gradientUnits="userSpaceOnUse" cx="512" cy="512" r="560">
      <stop offset="0.55" stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plate" gradientUnits="userSpaceOnUse" cx="430" cy="400" r="580">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="0.55" stop-color="#F97316"/>
      <stop offset="1" stop-color="#C2410C"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#halo)"/>
  <path d="M842 512A330 330 0 1 1 182 512A330 330 0 1 1 842 512ZM630 512A118 118 0 1 0 394 512A118 118 0 1 0 630 512Z"
        fill="url(#plate)" fill-rule="evenodd"/>
  <circle cx="512" cy="512" r="265" fill="none" stroke="#7C2D12" stroke-opacity="0.45" stroke-width="10"/>
  <circle cx="512" cy="512" r="180" fill="none" stroke="#7C2D12" stroke-opacity="0.45" stroke-width="10"/>
  <circle cx="512" cy="512" r="124" fill="none" stroke="#FDBA74" stroke-opacity="0.6" stroke-width="8"/>
</svg>
