  <!-- Design D "Z-Dumbbell" — Android adaptive-icon foreground layer
       (transparent bg, c2 duotone). Sized for flutter_launcher_icons'
       16% inset convention (the generated mipmap-anydpi-v26/ic_launcher.xml
       wraps this layer in a 16% inset): at scale 0.75 the glyph lands at
       ~45dp tall after the inset — inside the ⌀66dp safe zone, ~63% of the
       visible ~72dp window, matching the iOS master's ~60%. Do not
       pre-shrink this layer to the safe zone; the inset already does that. -->
