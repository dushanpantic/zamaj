<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Z-Dumbbell variation 5 "Chunky + implied wing nut" — preview, flat.
       Like v4 but the nut hub is 104 wide — matching the Z diagonal's visual
       stroke thickness (its perpendicular width; the horizontal chord is 160)
       — and the wings are short stubs, more implied than drawn. Wings anchor
       at the hub center so their inner ends stay buried in the hub.
       If chosen, the four layer masters get derived from this geometry. -->
  <rect width="1024" height="1024" fill="#161310"/>
  <g transform="translate(512 512) scale(0.7) translate(-512 -512)" fill="#F97316">
    <!-- top wing nut: hub width = diagonal stroke thickness, stub wings -->
    <rect x="460" y="92" width="104" height="61" rx="20"/>
    <rect x="-96" y="-17" width="96" height="34" rx="17" transform="translate(512 120) rotate(26)"/>
    <rect x="0" y="-17" width="96" height="34" rx="17" transform="translate(512 120) rotate(-26)"/>
    <!-- plate stack -->
    <rect x="332" y="169" width="360" height="64" rx="32"/>
    <path d="M300 259H724A28 28 0 0 1 752 287V377H300A28 28 0 0 1 272 349V287A28 28 0 0 1 300 259Z"/>
    <!-- handle, corner-to-corner -->
    <path d="M592 369H752V377L432 647V655H272V647L592 377Z"/>
    <path d="M272 647H724A28 28 0 0 1 752 675V737A28 28 0 0 1 724 765H300A28 28 0 0 1 272 737V647Z"/>
    <rect x="332" y="791" width="360" height="64" rx="32"/>
    <!-- bottom wing nut -->
    <rect x="460" y="871" width="104" height="61" rx="20"/>
    <rect x="-96" y="-17" width="96" height="34" rx="17" transform="translate(512 904) rotate(-26)"/>
    <rect x="0" y="-17" width="96" height="34" rx="17" transform="translate(512 904) rotate(26)"/>
  </g>
</svg>
