  <!-- Design D "Z-Dumbbell" — CHOSEN DESIGN (v7 geometry, c2 duotone).
       Full-bleed composite, flat colors. Adjustable dumbbell seen top-down:
       the Z (plates + corner-to-corner handle) is one continuous path with
       r28 fillets where the plate edges flow into the diagonal; smaller
       plates and spinlock wing nuts stack outward. Duotone: ember Z on
       off-white hardware, graphite tile.
       Use for: iOS appiconset (all sizes), Android legacy ic_launcher,
       Play Store 512. iOS applies its own squircle mask: no pre-rounded
       corners, no alpha. Glyph at scale 0.73 ≈ 60% of icon height. -->
