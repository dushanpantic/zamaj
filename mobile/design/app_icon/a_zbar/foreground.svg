<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Design A "Z-Bar" — Android adaptive-icon foreground layer (transparent bg).
       Sized for flutter_launcher_icons' convention: the generated
       mipmap-anydpi-v26/ic_launcher.xml wraps this layer in a 16% inset, so
       the canvas maps to the central ~73dp of the 108dp grid, NOT all of it.
       At scale 1.20 the glyph lands at ~43dp tall after the inset — inside
       the 66dp-diameter safe zone, ~60% of the visible ~72dp window, matching
       the iOS master's ~56%. Do not pre-shrink this layer to the safe zone;
       the inset already does that. -->
  <defs>
    <linearGradient id="ember" gradientUnits="userSpaceOnUse" x1="512" y1="262" x2="512" y2="762">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="0.5" stop-color="#F97316"/>
      <stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
  </defs>
  <g transform="translate(512 512) scale(1.2) translate(-512 -512)">
    <path d="M292 262H732V380L484 644H732V762H292V644L540 380H292Z" fill="url(#ember)"/>
  </g>
</svg>
